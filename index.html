        const mouse = {x:0, y:0}

            h: window.innerHeight,
            draw: function (){
                canvasCtx.fillStyle = "#eb3477"
                canvasCtx.fillRect(0,0, this.w, this.h) 
            },
        }
        const line = {
            w:15,
            h: field.h,
            draw: function(){
                canvasCtx.fillStyle = "#ffffff"
                canvasCtx.fillRect(field.w / 2 - this.w / 2, 0, this.h)
            },
        }
        const leftPaddle = {
            x: gapX,
            y: 0,
            w: line.w,
            h: 200,
            _move: function (){
                this.y = mouse.y - this.h/2
            },
            draw: function(){
                canvasCtx.fillStyle = "#ffffff"
                canvasCtx.fillRect(this.x, this.y, this.w, this.h)

                this._move()
            },
        }
        const rightpaddle = {
            x: field.w-line.w-gapX,

                }
            }

    </script>
